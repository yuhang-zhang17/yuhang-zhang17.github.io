# ----------------
# Site settings
# ----------------
title: "Yuhang Zhang"
name: "Yuhang Zhang"
email: "yuhang.zhang@tamu.edu"

description: >
  Ph.D. student researcher developing scalable modeling and optimization
  for building and district energy systems. Focus areas include HVAC&R
  energy efficiency, intelligent controls, heat pump technologies,
  and electrification of the built environment.

url: "https://yuhang-zhang17.github.io"
baseurl: ""

repository: yuhang-zhang17/yuhang-zhang17.github.io

timezone: America/Chicago
locale: en-US

# ----------------
# Theme
# ----------------
remote_theme: "mmistakes/minimal-mistakes"

minimal_mistakes_skin: air

search: true

# ----------------
# Build settings
# ----------------
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/

future: false

include:
  - _pages

# ----------------
# Plugins
# ----------------
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-gist
  - jemoji
  - jekyll-include-cache

# ----------------
# Author profile
# ----------------
author:
  name: "Yuhang Zhang"
  avatar: "/assets/images/bio-photo.jpg"

  bio: >
    Energy systems modeling & optimization • Intelligent controls (MPC)
    • HVAC&R efficiency • Heat pumps • Electrification

  location: "Texas A&M University"

  location: "College Station, TX"
  
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:yuhang.zhang@tamu.edu"

    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=RaCbNBcAAAAJ"

    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/yuhangzhang3"

# ----------------
# Footer
# ----------------
footer:
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:yuhang.zhang@tamu.edu"

# ----------------
# Defaults
# ----------------
defaults:

  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: false

# ----------------
# Google Analytics
# ----------------
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-26RKROFW3W"