# Site settings
title: Yuhang Zhang
email: yuhang.zhang@tamu.edu

description: >-
  Ph.D. student in Mechanical Engineering at Texas A&M University.
  Research focuses on district energy systems, thermal microgrids,
  and model predictive control (MPC) with physics-based and data-driven modeling.

# If this repo is yuhang-zhang17.github.io (user/organization site)
url: "https://yuhang-zhang17.github.io"
baseurl: ""  # keep empty for user site

github_username: yuhang-zhang17
# twitter_username:  # not needed for job-search academic site

minimal_mistakes_skin: air
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes

# Outputting
permalink: /:categories/:title/
paginate: 0
paginate_path: /page:num/
timezone: America/Chicago

include:
  - _pages

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Author profile (sidebar)
author:
  name   : "Yuhang Zhang"
  avatar : "/assets/images/bio-photo.jpg"  # later replace with your headshot
  bio    : "Ph.D. student at Texas A&M University. District energy systems • Thermal microgrids • MPC • Modeling & optimization."
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:yuhang.zhang@tamu.edu"

    - label: "Google Scholar"
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=RaCbNBcAAAAJ&hl=en"

    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/yuhangzhang3"

    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yuhang-zhang17"

# Footer links (keep minimal)
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yuhang-zhang17"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:yuhang.zhang@tamu.edu"

# Defaults
defaults:
  # _posts (optional blog; tuned for job-market site)
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: true

  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
analytics:
  provider: "google-gtag"
  google:
    tracking_id: "G-26RKROFW3W"